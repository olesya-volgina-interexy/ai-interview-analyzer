server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Dynamic gzip for any uncompressed responses
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # Serve pre-compressed .gz sidecars when present (vite-plugin-compression)
    gzip_static on;

    # Hashed assets — immutable, cache for 1 year
    location ~* \.(?:js|css|woff2?|svg|png|jpe?g|gif|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    # index.html must always revalidate to pick up new asset hashes
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # SPA fallback — unmatched routes are handled by the React router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Lightweight healthcheck endpoint
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
